<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Complaints - Officer Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .record-row {
            transition: all 0.2s;
            cursor: pointer;
        }
        .record-row:hover {
            background-color: rgba(0,0,0,0.02);
        }
        .details-pane {
            display: none;
            background-color: rgba(33, 102, 105, 0.02);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem;
        }
        .details-pane.active {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
        }
        
        .desc-section {
            font-size: 0.875rem;
        }
        .desc-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .resolution-form {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body>

    <nav class="navbar" style="padding-left: 2rem; padding-right: 2rem;">
        <div style="display: flex; align-items: center; gap: 4rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--primary); font-size: 1.25rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect>
                </svg>
                SmartCity <span style="font-weight: 400; font-size: 0.875rem; color: var(--text-secondary); margin-left: -4px;">Officer Portal</span>
            </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div style="position: relative; width: 300px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 10px; color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="form-control" style="width: 100%; padding-left: 2.5rem; background-color: var(--bg-color); border: none;" placeholder="Search complaints, tracking IDs...">
            </div>
            <button class="btn btn-ghost" style="padding: 0.5rem;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
            <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">
                <img src="https://ui-avatars.com/api/?name=Officer+Wilson&background=216669&color=fff" style="width: 100%; height: 100%; border-radius: 50%;" alt="Officer">
            </div>
        </div>
    </nav>

    <div class="dashboard-layout" style="min-height: 100vh;">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <a href="officer-dashboard.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a>
                <a href="assigned.html" class="sidebar-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Assigned</a>
                <a href="resolved.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Resolved</a>
                <a href="analytics.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> Analytics</a>
            </div>

            <div style="position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;">
                <button class="btn btn-outline w-full" data-action="logout" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="padding: 2rem 3rem;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; font-weight: 700;">Assigned Complaints</h1>
            </div>

            <!-- Records -->
            <div class="card">
                <div class="table-container">
                    <table style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Complaint ID</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th style="text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="officerTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Logic -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireRole(['Department Officer']);
            
            // For demo purposes, we'll assign the officer to view all or specific active ones
            const allComplaints = store.getComplaints().filter(c => c.status !== 'Resolved' && c.status !== 'Closed');

            const renderTable = () => {
                const tbody = document.getElementById('officerTableBody');
                tbody.innerHTML = '';

                if (allComplaints.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No active records assigned.</td></tr>`;
                    return;
                }

                allComplaints.forEach(c => {
                    const statusClass = c.status.toLowerCase().replace(' ', '-');
                    const priorityColor = c.priority === 'High' ? 'var(--status-error)' : (c.priority === 'Medium' ? 'var(--status-progress)' : 'var(--text-muted)');
                    
                    // Main Row
                    const tr = document.createElement('tr');
                    tr.className = 'record-row';
                    tr.innerHTML = `
                        <td style="font-weight: 600;">${c.id}</td>
                        <td style="color: var(--text-secondary);">${c.category}</td>
                        <td>
                            <span style="font-size: 0.65rem; font-weight: 700; color: white; background: ${priorityColor}; padding: 0.125rem 0.5rem; border-radius: 4px; text-transform: uppercase;">
                                ${c.priority}
                            </span>
                        </td>
                        <td><span class="badge badge-${statusClass}">${c.status}</span></td>
                        <td style="color: var(--text-secondary); font-size: 0.75rem;">${c.date}</td>
                        <td style="text-align: right;">
                            <button class="btn btn-ghost details-btn" style="color: var(--primary); font-size: 0.75rem; font-weight: 600;">Details</button>
                        </td>
                    `;

                    // Details Pane (initially hidden)
                    const detailsTr = document.createElement('tr');
                    const detailsTd = document.createElement('td');
                    detailsTd.colSpan = 6;
                    detailsTd.style.padding = 0;
                    detailsTd.style.borderBottom = 'none';

                    // Form select state matching current status
                    const statuses = ['Submitted', 'Assigned', 'In Progress', 'Resolved', 'Closed'];
                    const optionsHtml = statuses.map(s => `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`).join('');

                    detailsTd.innerHTML = `
                        <div class="details-pane" id="pane-${c.id}">
                            <div class="desc-section">
                                <div class="desc-label">Detailed Description</div>
                                <p style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5;">${c.description}</p>
                                
                                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                                    <div>
                                        <div class="desc-label">Citizen Contact</div>
                                        <div style="font-weight: 500;">Citizen ID: ${c.citizenId}</div>
                                    </div>
                                    <div>
                                        <div class="desc-label">Location</div>
                                        <div style="font-weight: 500; color: var(--primary); display: flex; align-items: center; gap: 0.25rem;">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                            ${c.location}
                                        </div>
                                    </div>
                                </div>

                                <div class="desc-label">Evidence Photos</div>
                                <div style="display: flex; gap: 0.5rem;">
                                    <div style="width: 80px; height: 60px; background-color: #d1d5db; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.65rem;">No Img</div>
                                </div>
                            </div>
                            
                            <div>
                                <form class="resolution-form" id="form-${c.id}">
                                    <div class="desc-label" style="margin-bottom: 1rem; color: var(--primary);">Resolution Form</div>
                                    
                                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.75rem;">Update Status</label>
                                            <select class="form-control" name="status" style="font-size: 0.875rem;">
                                                ${optionsHtml}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.75rem;">Update Priority</label>
                                            <select class="form-control" name="priority" style="font-size: 0.875rem;">
                                                <option value="Low" ${c.priority === 'Low' ? 'selected' : ''}>Low</option>
                                                <option value="Medium" ${c.priority === 'Medium' ? 'selected' : ''}>Medium</option>
                                                <option value="High" ${c.priority === 'High' ? 'selected' : ''}>High</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label" style="font-size: 0.75rem;">Internal Remarks</label>
                                        <textarea class="form-control" name="notes" placeholder="Describe progress or resolution steps..." style="min-height: 80px; font-size: 0.875rem;"></textarea>
                                    </div>

                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
                                        <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem; width: 100%;">Update Complaint</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `;
                    detailsTr.appendChild(detailsTd);

                    tbody.appendChild(tr);
                    tbody.appendChild(detailsTr);

                    // Toggle logic
                    tr.querySelector('.details-btn').addEventListener('click', () => {
                        const pane = document.getElementById(`pane-${c.id}`);
                        pane.classList.toggle('active');
                        const btn = tr.querySelector('.details-btn');
                        btn.textContent = pane.classList.contains('active') ? 'Close' : 'Details';
                    });

                    // Form submit logic
                    const form = document.getElementById(`form-${c.id}`);
                    form.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = new FormData(form);
                        const newStatus = formData.get('status');
                        const note = formData.get('notes');
                        store.updateComplaintStatus(c.id, newStatus, note);
                        alert(`Complaint ${c.id} updated!`);
                        window.location.reload();
                    });
                });
            };

            renderTable();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Dashboard - Smart Public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .stat-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .trend {
            font-size: 0.75rem;
            font-weight: 600;
        }
        .chart-placeholder {
            width: 100%;
            height: 300px;
            background: repeating-linear-gradient(
                -45deg,
                rgba(33, 102, 105, 0.05),
                rgba(33, 102, 105, 0.05) 10px,
                transparent 10px,
                transparent 20px
            );
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <nav class="navbar" style="padding-left: 2rem; padding-right: 2rem;">
        <div style="display: flex; align-items: center; gap: 4rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--primary); font-size: 1.25rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect>
                </svg>
                SmartCity <span style="font-weight: 400; font-size: 0.875rem; color: var(--text-secondary); margin-left: -4px;">Officer Portal</span>
            </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div style="position: relative; width: 300px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 10px; color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="form-control" style="width: 100%; padding-left: 2.5rem; background-color: var(--bg-color); border: none;" placeholder="Search complaints, tracking IDs...">
            </div>
            <button class="btn btn-ghost" style="padding: 0.5rem;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
            <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">
                <img src="https://ui-avatars.com/api/?name=Officer+Wilson&background=216669&color=fff" style="width: 100%; height: 100%; border-radius: 50%;" alt="Officer">
            </div>
        </div>
    </nav>

    <div class="dashboard-layout" style="min-height: 100vh;">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <a href="officer-dashboard.html" class="sidebar-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a>
                <a href="assigned.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Assigned</a>
                <a href="resolved.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Resolved</a>
                <a href="analytics.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> Analytics</a>
            </div>

            <div style="position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;">
                <button class="btn btn-outline w-full" data-action="logout" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="padding: 2rem 3rem;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">Overview</h1>
                    <p style="color: var(--text-secondary); font-size: 0.875rem;">Summary of your department's current workload.</p>
                </div>
                <div>
                    <select class="form-control" style="font-size: 0.75rem; padding: 0.25rem 2rem 0.25rem 0.75rem; background-color: white;">
                        <option>This Week</option>
                        <option>This Month</option>
                    </select>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-title">Pending Complaints</div>
                    <div class="stat-value">
                        <span id="officer-pending">0</span>
                        <span class="trend" style="color: var(--status-error);">-2%</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">In Progress</div>
                    <div class="stat-value">
                        <span id="officer-progress">0</span>
                        <span class="trend" style="color: var(--status-resolved);">+5%</span>
                    </div>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--status-error);">
                    <div class="stat-title">High Priority</div>
                    <div class="stat-value">
                        <span id="officer-high">0</span>
                        <span class="trend" style="color: var(--text-muted); font-weight: 400;">Attention Required</span>
                    </div>
                </div>
            </div>

            <div class="card" style="padding: 1.5rem;">
                <h3 style="font-size: 1rem; margin-bottom: 1rem;">Recent Activity</h3>
                <div class="chart-placeholder" style="height: 150px;">
                    Activity Feed Placeholder
                </div>
            </div>

        </main>
    </div>

    <!-- Logic -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireRole(['Department Officer']);
            
            const allComplaints = store.getComplaints().filter(c => c.status !== 'Closed');
            
            const pending = allComplaints.filter(c => c.status === 'Submitted' || c.status === 'Assigned');
            const inProgress = allComplaints.filter(c => c.status === 'In Progress');
            const high = pending.concat(inProgress).filter(c => c.priority === 'High');

            document.getElementById('officer-pending').textContent = pending.length < 10 ? '0'+pending.length : pending.length;
            document.getElementById('officer-progress').textContent = inProgress.length < 10 ? '0'+inProgress.length : inProgress.length;
            document.getElementById('officer-high').textContent = high.length < 10 ? '0'+high.length : high.length;
        });
    </script>
</body>
</html>

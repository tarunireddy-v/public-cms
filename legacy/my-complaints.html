<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints - Smart Public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .table-container {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: rgba(33, 102, 105, 0.04);
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 1.25rem 1.5rem;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background-color: rgba(0,0,0,0.01);
        }
        .priority-badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav class="navbar" style="padding-left: 2rem; padding-right: 2rem;">
        <div style="display: flex; align-items: center; gap: 4rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: var(--primary); font-size: 1.25rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect>
                </svg>
                SmartCity <span style="font-weight: 400; font-size: 0.875rem; color: var(--text-secondary); margin-left: -4px;">Citizen Portal</span>
            </div>
            
            <div style="position: relative; width: 400px; display: none;" id="searchBar">
            </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div style="position: relative; width: 300px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 10px; color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="form-control" style="width: 100%; padding-left: 2.5rem; background-color: var(--bg-color); border: none;" placeholder="Search complaints, tracking IDs...">
            </div>
            <button class="btn btn-ghost" style="padding: 0.5rem;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
            <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">U</div>
        </div>
    </nav>

    <div class="dashboard-layout" style="min-height: 100vh;">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <a href="citizen-dashboard.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a>
                <a href="my-complaints.html" class="sidebar-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> My Complaints</a>
                <a href="submit-complaint.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Submit New</a>
            </div>

            <div style="position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;">
                <button class="btn btn-outline w-full" data-action="logout" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout</button>
            </div>
        </aside>

        <main class="main-content" style="padding: 2rem 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">My Complaints</h1>
                    <p style="color: var(--text-secondary); font-size: 0.875rem;">View and track all your submitted reports.</p>
                </div>
                <a href="submit-complaint.html" class="btn btn-primary" style="font-size: 0.875rem;">+ Submit New Complaint</a>
            </div>

            <div class="table-container">
                <div style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: white;">
                    <h3 style="font-size: 1rem;">All Records</h3>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-outline" style="font-size: 0.75rem; padding: 0.25rem 0.75rem;">Filter by Status</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Complaint ID</th>
                            <th>Title</th>
                            <th>Department</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Date Submitted</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsTableBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>

            <div style="padding: 1rem 0; font-size: 0.75rem; color: var(--text-muted);">
                Showing all records
            </div>
        </main>
    </div>

    <!-- Logic -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireRole(['Citizen']);
            const session = auth.getSession();
            const myComplaints = store.getComplaintsByCitizen(session ? session.username : 'user1');

            const tbody = document.getElementById('complaintsTableBody');
            
            if (myComplaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No complaints filed yet. <a href="submit-complaint.html" style="color: var(--primary)">Submit one now.</a></td></tr>`;
            } else {
                myComplaints.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(c => {
                    const statusClass = c.status.toLowerCase().replace(' ', '-');
                    const priorityColor = c.priority === 'High' ? 'var(--status-error)' : (c.priority === 'Medium' ? 'var(--status-progress)' : 'var(--text-muted)');
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 600;">${c.id}</td>
                        <td style="font-weight: 500;">${c.title}</td>
                        <td style="color: var(--text-secondary);">${c.department}</td>
                        <td>
                            <span class="priority-badge" style="background: ${priorityColor};">
                                ${c.priority || 'Medium'}
                            </span>
                        </td>
                        <td><span class="badge badge-${statusClass}">${c.status}</span></td>
                        <td style="color: var(--text-secondary);">${c.date}</td>
                        <td style="text-align: right;">
                            <a href="tracking.html?id=${c.id}" class="btn btn-ghost" style="color: var(--primary); font-size: 0.75rem; font-weight: 600;">View Details</a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    </script>
</body>
</html>

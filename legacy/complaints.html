<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Complaints - Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .record-row {
            transition: all 0.2s;
        }
        .record-row:hover {
            background-color: rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

    <div class="dashboard-layout" style="min-height: 100vh;">
        <!-- Admin Sidebar -->
        <aside class="sidebar">
            <div style="padding: 0 1.5rem 2rem; display: flex; align-items: center; gap: 0.75rem; font-weight: 700; color: var(--primary); font-size: 1.125rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                SmartPublic <span style="font-weight: 400; font-size: 0.75rem; color: var(--text-secondary); margin-left: -4px;">ADMIN PORTAL</span>
            </div>

            <div class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a>
                <a href="complaints.html" class="sidebar-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Complaints</a>
                <a href="departments.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> Departments</a>
                <a href="#" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Users</a>
                <a href="reports.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> Reports</a>
            </div>

            <div style="position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                    <button class="btn btn-ghost w-full" data-action="logout" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-align: center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="padding: 2rem 3rem;">
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.75rem; margin-bottom: 0.25rem;">System Complaints</h1>
                    <p style="color: var(--text-secondary); font-size: 0.875rem;">Global view of all citizen reports across all departments.</p>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <div style="position: relative; width: 300px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 10px; color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" class="form-control" style="width: 100%; padding-left: 2.5rem; background-color: var(--surface); border: 1px solid var(--border-color);" placeholder="Search globally...">
                    </div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <select class="form-control" style="width: auto; min-width: 150px;">
                    <option value="">All Departments</option>
                    <option value="Electricity">Electricity</option>
                    <option value="Water Supply">Water Supply</option>
                    <option value="Roads & Infrastructure">Roads</option>
                    <option value="Sanitation">Sanitation</option>
                </select>
                <select class="form-control" style="width: auto; min-width: 150px;">
                    <option value="">All Statuses</option>
                    <option value="Submitted">Submitted</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </div>

            <!-- Table -->
            <div class="card">
                <div class="table-container">
                    <table style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Complaint ID</th>
                                <th>Category</th>
                                <th>Citizen ID</th>
                                <th>Department</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th style="text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminAllComplaintsBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
                <div style="padding: 1rem 1.5rem; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border-color);">
                    Showing <span id="admin-complaint-count">0</span> matching records
                </div>
            </div>

        </main>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireRole(['Admin']);
            
            const complaints = store.getComplaints().sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const tbody = document.getElementById('adminAllComplaintsBody');
            document.getElementById('admin-complaint-count').textContent = complaints.length;

            if (complaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted">No complaints found.</td></tr>`;
                return;
            }

            tbody.innerHTML = complaints.map(c => {
                const statusClass = c.status.toLowerCase().replace(' ', '-');
                const priorityColor = c.priority === 'High' ? 'var(--status-error)' : (c.priority === 'Medium' ? 'var(--status-progress)' : 'var(--text-muted)');
                
                return `
                    <tr class="record-row">
                        <td style="font-weight: 500;">
                            <a href="tracking.html?id=${c.id}" target="_blank" style="color: inherit; text-decoration: none;">${c.id}</a>
                        </td>
                        <td>${c.category}</td>
                        <td style="color: var(--text-secondary); font-size: 0.8rem;">${c.citizenId}</td>
                        <td style="color: var(--text-secondary);">${c.department}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.65rem; font-weight: 700; color: white; background: ${priorityColor}; padding: 0.125rem 0.5rem; border-radius: 4px; display: inline-flex; text-transform: uppercase;">
                                ${c.priority}
                            </div>
                        </td>
                        <td><span class="badge badge-${statusClass}">${c.status}</span></td>
                        <td style="color: var(--text-secondary); font-size: 0.75rem;">${c.date}</td>
                        <td style="text-align: right;">
                            <a href="tracking.html?id=${c.id}" class="btn btn-ghost" style="color: var(--primary); font-size: 0.75rem; font-weight: 600;">View</a>
                        </td>
                    </tr>
                `;
            }).join('');
        });
    </script>
</body>
</html>

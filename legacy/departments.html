<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <div class="dashboard-layout" style="min-height: 100vh;">
        <!-- Admin Sidebar -->
        <aside class="sidebar">
            <div style="padding: 0 1.5rem 2rem; display: flex; align-items: center; gap: 0.75rem; font-weight: 700; color: var(--primary); font-size: 1.125rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                SmartPublic <span style="font-weight: 400; font-size: 0.75rem; color: var(--text-secondary); margin-left: -4px;">ADMIN PORTAL</span>
            </div>

            <div class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a>
                <a href="complaints.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Complaints</a>
                <a href="departments.html" class="sidebar-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> Departments</a>
                <a href="#" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Users</a>
                <a href="reports.html" class="sidebar-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> Reports</a>
            </div>

            <div style="position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                    <button class="btn btn-ghost w-full" data-action="logout" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-align: center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="padding: 2rem 3rem;">
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.75rem; margin-bottom: 0.25rem;">Municipal Departments</h1>
                    <p style="color: var(--text-secondary); font-size: 0.875rem;">Manage linked agencies and their routing logic.</p>
                </div>
                <button class="btn btn-primary">+ Add Department</button>
            </div>

            <!-- Grid -->
            <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 1.5rem;" id="deptGrid">
                <!-- Populated via JS -->
            </div>

        </main>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireRole(['Admin']);
            
            const departments = [
                { name: 'Electricity', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>', reps: 12, rating: 4.8 },
                { name: 'Water Supply', icon: '<path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>', reps: 8, rating: 4.2 },
                { name: 'Sanitation', icon: '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>', reps: 15, rating: 3.9 },
                { name: 'Roads & Infrastructure', icon: '<path d="M2 22h20"></path><path d="M12 2v20"></path><path d="M5 12h14"></path>', reps: 24, rating: 4.5 },
                { name: 'Public Safety', icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>', reps: 30, rating: 4.7 }
            ];

            const grid = document.getElementById('deptGrid');
            
            grid.innerHTML = departments.map(d => `
                <div class="card" style="padding: 1.5rem; transition: transform 0.2s; cursor: pointer;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div style="width: 48px; height: 48px; border-radius: 12px; background: rgba(33, 102, 105, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${d.icon}</svg>
                        </div>
                        <span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--status-resolved); font-weight: 600;">ACTIVE</span>
                    </div>
                    <h3 style="font-size: 1.125rem; margin-bottom: 0.5rem;">${d.name}</h3>
                    <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.5rem;">Resolving citizen complaints automatically routed by the SmartCity AI.</p>
                    
                    <div style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 1rem; font-size: 0.875rem;">
                        <div style="color: var(--text-secondary);">Officers: <strong style="color: var(--text-primary);">${d.reps}</strong></div>
                        <div style="display: flex; align-items: center; gap: 0.25rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <strong>${d.rating}</strong>
                        </div>
                    </div>
                </div>
            `).join('');

        });
    </script>
</body>
</html>
